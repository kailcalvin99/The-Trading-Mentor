kind = "video"
previewPath = "/marketing-video/"
title = "ICT Trading Mentor — Marketing Video"
version = "1.0.0"
id = "artifacts/marketing-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/marketing-video/" ]
localPort = 18472

[services.development]
run = "pnpm --filter @workspace/marketing-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketing-video", "run", "build" ]
publicDir = "artifacts/marketing-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18472"
BASE_PATH = "/marketing-video/"
